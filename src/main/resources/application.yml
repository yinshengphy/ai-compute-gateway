server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: ai-compute-gateway

management:
  endpoints:
    web:
      exposure:
        include: health,info

gateway:
  ollama-base-url: ${OLLAMA_BASE_URL:http://ai-compute-runtime:11434}
  api-token: ${AI_COMPUTE_API_TOKEN:change-me}
  runtime-token: ${AI_COMPUTE_RUNTIME_TOKEN:}
  queue-timeout-ms: ${AI_COMPUTE_QUEUE_TIMEOUT_MS:30000}
  chat-concurrency: ${AI_COMPUTE_CHAT_CONCURRENCY:1}
  embedding-concurrency: ${AI_COMPUTE_EMBEDDING_CONCURRENCY:1}
  default-chat-model: ${AI_COMPUTE_CHAT_MODEL:huihui_ai/qwen3-vl-abliterated:4b-instruct}
  fallback-chat-model: ${AI_COMPUTE_FALLBACK_CHAT_MODEL:qwen2.5:3b}
  default-embedding-model: ${AI_COMPUTE_EMBEDDING_MODEL:bge-m3}
  fallback-embedding-model: ${AI_COMPUTE_FALLBACK_EMBEDDING_MODEL:nomic-embed-text}
  chat-keep-alive: ${AI_COMPUTE_CHAT_KEEP_ALIVE:10m}
  embedding-keep-alive: ${AI_COMPUTE_EMBEDDING_KEEP_ALIVE:5m}
